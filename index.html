<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 марта!</title>
    
    <!-- Подключаем шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Good Vibes Pro (через Great Vibes) -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- Caveat для подписи -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(165deg, #fee3e8 0%, #fec9dd 60%, #d4e4ff 100%);
            position: relative;
            overflow-x: hidden;
            padding: 10px;
        }

        /* КРАСНЫЕ ЯРКИЕ СЕРДЕЧКИ */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" opacity="0.25"><path fill="%23ff3366" d="M20 8 C 12 0, 0 6, 0 16 C 0 26, 20 36, 20 36 C 20 36, 40 26, 40 16 C 40 6, 28 0, 20 8 Z" /></svg>');
            background-repeat: repeat;
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
            animation: float 40s infinite linear;
        }

        /* Горы (три слоя) */
        .mountains {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 1;
            pointer-events: none;
        }

        .mountain-range-far {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="none"><path fill="%23d9c2cc" opacity="0.6" d="M0,180 L60,120 L150,150 L250,80 L350,130 L450,60 L550,100 L650,40 L750,90 L850,20 L950,70 L1050,30 L1150,100 L1200,60 L1200,200 L0,200 Z" /></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: bottom;
            filter: blur(1px);
        }

        .mountain-range-mid {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" preserveAspectRatio="none"><path fill="%23997b8c" opacity="0.8" d="M0,200 L80,130 L200,170 L300,90 L420,140 L540,50 L660,110 L780,30 L900,100 L1020,40 L1140,120 L1200,80 L1200,250 L0,250 Z" /></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: bottom;
        }

        .mountain-range-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="none"><path fill="%236d4e5e" opacity="0.5" d="M0,180 L40,140 L100,160 L200,100 L280,140 L360,70 L440,110 L520,40 L600,90 L680,20 L760,70 L840,30 L920,80 L1000,10 L1080,60 L1160,30 L1200,50 L1200,200 L0,200 Z" /></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: bottom;
            filter: blur(0.5px);
        }

        .mountain-shadow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to top, rgba(109, 78, 94, 0.3), transparent);
            z-index: 2;
        }

        @keyframes float {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        /* Основной контейнер */
        .wrapper {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 500px;
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Логотип */
        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            position: relative;
            z-index: 25;
        }

        .logo {
            max-width: 180px;
            width: auto;
            height: auto;
            max-height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(2px);
            padding: 8px 15px;
        }

        /* ЗАГОЛОВОК — УВЕЛИЧЕННЫЙ */
        .greeting {
            font-size: clamp(28px, 7vw, 42px); /* Увеличил минимальный и максимальный размер */
            font-weight: 400;
            font-family: 'Great Vibes', cursive;
            color: #5a2e48;
            text-shadow: 3px 3px 8px rgba(255, 240, 245, 0.9), 0 3px 12px rgba(255, 100, 150, 0.6); /* Усилил тени */
            line-height: 1.2;
            letter-spacing: 0.5px;
            background: rgba(255, 240, 245, 0.6); /* Чуть плотнее фон */
            backdrop-filter: blur(3px);
            display: inline-block;
            padding: 10px 30px; /* Увеличил отступы */
            border-radius: 70px;
            box-shadow: 0 8px 20px rgba(255, 80, 130, 0.4); /* Ярче тень */
            border: 2px solid rgba(255, 255, 255, 0.9); /* Толще рамка */
            position: relative;
            z-index: 10;
            white-space: nowrap;
        }

        /* Цветы вокруг заголовка — тоже чуть крупнее */
        .greeting::before {
            content: "❀";
            font-size: 1.3em;
            margin-right: 10px;
            color: #ff4477; /* Более яркий цвет */
            display: inline-block;
            filter: drop-shadow(0 3px 5px #ff99bb);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .greeting::after {
            content: "❀";
            font-size: 1.3em;
            margin-left: 10px;
            color: #ff4477;
            display: inline-block;
            filter: drop-shadow(0 3px 5px #ff99bb);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Видео */
        .video-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 12px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1), 0 0 0 2px #fff3f8 inset, 0 0 0 4px #ffd9e6 inset;
            border: 1px solid rgba(255, 200, 220, 0.7);
            position: relative;
            z-index: 22;
        }

        video {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 22px;
            box-shadow: 0 8px 20px rgba(109, 59, 94, 0.25);
            background-color: #1a0f14;
        }

        /* Подпись */
        .footer-note {
            margin-top: 10px;
            font-size: 22px; /* Чуть крупнее */
            font-family: 'Caveat', cursive;
            color: #7a4d66;
            text-shadow: 0 2px 4px white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(2px);
            border-radius: 50px;
            position: relative;
            z-index: 23;
        }

        .footer-note span {
            font-size: 30px;
            filter: drop-shadow(0 3px 5px #ff7a9e);
            animation: pulse 2s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 480px) {
            .wrapper {
                padding: 10px 5px;
                gap: 12px;
            }
            .logo {
                max-width: 140px;
                max-height: 70px;
                padding: 6px 12px;
            }
            .greeting {
                font-size: 26px; /* На телефоне тоже крупно */
                padding: 8px 20px;
                white-space: nowrap;
            }
            .greeting::before, .greeting::after {
                font-size: 24px;
            }
            .video-container {
                padding: 8px;
                border-radius: 24px;
            }
            video {
                border-radius: 18px;
            }
            .footer-note {
                font-size: 18px;
                padding: 6px 18px;
            }
            .footer-note span {
                font-size: 26px;
            }
            .mountains {
                height: 150px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 360px) {
            .greeting {
                font-size: 22px;
                padding: 6px 15px;
            }
            .greeting::before, .greeting::after {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Горы -->
    <div class="mountains">
        <div class="mountain-range-far"></div>
        <div class="mountain-range-mid"></div>
        <div class="mountain-range-front"></div>
        <div class="mountain-shadow"></div>
    </div>

    <div class="wrapper">
        <!-- ЛОГОТИП -->
        <div class="logo-container">
            <img src="logo.png" alt="Логотип" class="logo">
        </div>

        <!-- ЗАГОЛОВОК (увеличенный) -->
        <h1 class="greeting">С 8 марта, дорогие Дамы</h1>

        <!-- ВИДЕО -->
        <div class="video-container">
            <video id="player" controls autoplay playsinline>
                Ваш браузер не поддерживает тег video.
            </video>
        </div>

        <!-- ПОДПИСЬ -->
        <div class="footer-note">
            <span>❀</span> С любовью! <span>✿</span>
        </div>
    </div>

    <script>
        const videoSources = ["Video1.mp4", "Video2.mp4", "Video3.mp4"];
        const randomIndex = Math.floor(Math.random() * videoSources.length);
        const videoElement = document.getElementById('player');
        videoElement.src = videoSources[randomIndex];
        videoElement.load();
        videoElement.play().catch(e => console.log("Автозапуск не удался:", e));
    </script>
</body>
</html>
