<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(145deg, #f9e3e8 0%, #f5d0db 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* ---- Ровные сердечки (паттерн) ---- */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" opacity="0.15"><path fill="%23ff99aa" d="M20 8 C 12 0, 0 6, 0 16 C 0 26, 20 36, 20 36 C 20 36, 40 26, 40 16 C 40 6, 28 0, 20 8 Z" /></svg>');
            background-repeat: repeat;
            background-size: 120px 120px;
            pointer-events: none;
            z-index: 0;
            animation: float 30s infinite linear;
        }

        /* ---- Горы вдалеке (полупрозрачный силуэт) ---- */
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" preserveAspectRatio="none" opacity="0.2"><path fill="%23997b8c" d="M0,150 L150,50 L300,130 L450,20 L600,100 L750,40 L900,110 L1050,10 L1200,80 L1200,200 L0,200 Z" /></svg>');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: bottom;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        /* Основной контейнер */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            text-align: center;
        }

        /* Заголовок */
        .greeting {
            font-size: clamp(28px, 6vw, 48px);
            font-weight: 700;
            color: #6d3b5e;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            line-height: 1.2;
            letter-spacing: 1px;
            background: rgba(255, 240, 245, 0.6);
            backdrop-filter: blur(2px);
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 150, 180, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* Контейнер видео */
        .video-container {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 15px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 0 0 2px #fff3f8 inset, 0 0 0 4px #ffd9e6 inset;
            border: 1px solid rgba(255, 200, 220, 0.7);
        }

        video {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(109, 59, 94, 0.2);
            background-color: #1a0f14;
        }

        /* Подпись */
        .footer-note {
            margin-top: 25px;
            font-size: 18px;
            color: #8b5f7c;
            font-style: italic;
            text-shadow: 0 1px 2px white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-note span {
            font-size: 24px;
            filter: drop-shadow(0 2px 4px #ffa5c3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @media (max-width: 600px) {
            .video-container { padding: 8px; border-radius: 24px; }
            video { border-radius: 18px; }
            .greeting { padding: 8px 20px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1 class="greeting">🌷 С 8 марта, дорогие Дамы 🌷</h1>

        <div class="video-container">
            <video id="player" controls autoplay playsinline>
                Ваш браузер не поддерживает тег video.
            </video>
        </div>

        <div class="footer-note">
            <span>🌸</span> С любовью, ваши походники <span>🌸</span>
        </div>
    </div>

    <script>
        const videoSources = ["Testy.mp4", "mey.mp4", "Odin.mp4"];
        const randomIndex = Math.floor(Math.random() * videoSources.length);
        const videoElement = document.getElementById('player');
        videoElement.src = videoSources[randomIndex];
        videoElement.load();
        videoElement.play().catch(e => console.log("Автозапуск не удался:", e));
    </script>
</body>
</html>
